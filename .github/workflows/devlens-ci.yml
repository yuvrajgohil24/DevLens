name: DevLens CI — Smart Orchestrator

on:
  push:
    branches: [main, develop, deploy-testing]
    paths:
      - 'apps/backend/**'
      - 'apps/frontend/**'
  workflow_dispatch:

jobs:
  build-and-notify:
    runs-on: ubuntu-latest
    env:
      WEBHOOK_URL: ${{ secrets.DEVLENS_WEBHOOK_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect Changed Service
        id: filter
        run: |
          if git diff --name-only HEAD^ HEAD | grep -q "^apps/backend/"; then
            echo "service=backend" >> $GITHUB_OUTPUT
            echo "lang=Node.js" >> $GITHUB_OUTPUT
          elif git diff --name-only HEAD^ HEAD | grep -q "^apps/frontend/"; then
            echo "service=frontend" >> $GITHUB_OUTPUT
            echo "lang=Next.js" >> $GITHUB_OUTPUT
          else
            echo "service=devlens" >> $GITHUB_OUTPUT
            echo "lang=TypeScript" >> $GITHUB_OUTPUT
          fi

      - name: Set Dynamic Service Name
        id: naming
        run: |
          BASE_NAME="devlens-${{ steps.filter.outputs.service }}"
          if [ "${{ github.ref_name }}" != "main" ]; then
            echo "full_name=${BASE_NAME}-${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "env=staging" >> $GITHUB_OUTPUT
          else
            echo "full_name=${BASE_NAME}" >> $GITHUB_OUTPUT
            echo "env=production" >> $GITHUB_OUTPUT
          fi

      - name: Notify DevLens — Deployment Started
        if: env.WEBHOOK_URL != ''
        continue-on-error: true
        run: |
          curl -v --max-time 60 -X POST ${{ env.WEBHOOK_URL }}/api/webhooks/pipeline \
            -H "Content-Type: application/json" \
            -H "Bypass-Tunnel-Reminder: true" \
            -H "ngrok-skip-browser-warning: true" \
            -d '{
              "commit_sha":      "${{ github.sha }}",
              "service_name":    "${{ steps.naming.outputs.full_name }}",
              "branch":          "${{ github.ref_name }}",
              "author":          "${{ github.actor }}",
              "status":          "running",
              "environment":     "${{ steps.naming.outputs.env }}",
              "commit_message":  "${{ github.event.head_commit.message }}",
              "pipeline_url":    "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
              "language":        "${{ steps.filter.outputs.lang }}",
              "repo_url":        "https://github.com/${{ github.repository }}"
            }'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci

      - name: Generate Prisma Client (Backend Only)
        if: steps.filter.outputs.service == 'backend'
        run: npx prisma generate --schema=apps/backend/prisma/schema.prisma

      - name: Type Check (Conditional)
        run: |
          if [ "${{ steps.filter.outputs.service }}" == "backend" ]; then
            npx tsc --noEmit -p apps/backend/tsconfig.json
          else
            npx tsc --noEmit -p apps/frontend/tsconfig.json
          fi

      - name: Notify DevLens — Build Success
        if: success() && env.WEBHOOK_URL != ''
        continue-on-error: true
        run: |
          curl -v --max-time 60 -X POST ${{ env.WEBHOOK_URL }}/api/webhooks/pipeline \
            -H "Content-Type: application/json" \
            -H "Bypass-Tunnel-Reminder: true" \
            -H "ngrok-skip-browser-warning: true" \
            -d '{
              "commit_sha": "${{ github.sha }}",
              "service_name": "${{ steps.naming.outputs.full_name }}",
              "branch": "${{ github.ref_name }}",
              "author": "${{ github.actor }}",
              "status": "success",
              "environment": "${{ steps.naming.outputs.env }}",
              "pipeline_url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }'

      - name: Notify DevLens — Build Failed
        if: failure() && env.WEBHOOK_URL != ''
        continue-on-error: true
        run: |
          curl -v --max-time 60 -X POST ${{ env.WEBHOOK_URL }}/api/webhooks/pipeline \
            -H "Content-Type: application/json" \
            -H "Bypass-Tunnel-Reminder: true" \
            -H "ngrok-skip-browser-warning: true" \
            -d '{
              "commit_sha": "${{ github.sha }}",
              "service_name": "${{ steps.naming.outputs.full_name }}",
              "branch": "${{ github.ref_name }}",
              "author": "${{ github.actor }}",
              "status": "failed",
              "environment": "${{ steps.naming.outputs.env }}",
              "pipeline_url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }'
